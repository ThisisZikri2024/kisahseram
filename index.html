<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkib Mistik - Koleksi Kisah Seram</title>
    <style>
        :root {
            --blood-red: #8b0000;
            --bright-red: #ff0000;
            --dark-bg: #050505;
            --card-bg: #111;
            --text-gray: #bbb;
        }

        body {
            background-color: var(--dark-bg);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Input Section dengan LED Glow */
        .input-section {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border: 1px solid #300;
            border-top: 4px solid var(--bright-red);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
            margin-bottom: 50px;
            border-radius: 4px;
        }

        h1 {
            text-align: center;
            color: var(--bright-red);
            letter-spacing: 5px;
            margin-top: 0;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        .field { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #666; margin-bottom: 5px; font-weight: bold; }

        input, textarea {
            width: 100%; padding: 12px; background: #080808; border: 1px solid #222;
            color: #fff; box-sizing: border-box; font-size: 15px; transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--bright-red); box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); outline: none; }

        button.btn-save {
            width: 100%; padding: 15px; background: var(--blood-red); color: white; border: none;
            font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.4s; letter-spacing: 2px;
        }

        button.btn-save:hover { background: var(--bright-red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }

        /* Archive Section */
        .archive-section { width: 100%; max-width: 600px; }
        .archive-title { border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; color: #555; display: flex; justify-content: space-between; }

        .story-card {
            background: #121212; padding: 25px; border-radius: 4px; margin-bottom: 20px;
            border: 1px solid #1a1a1a; border-left: 4px solid #333; position: relative; transition: 0.3s;
        }

        .story-card:hover { border-left-color: var(--bright-red); background: #181818; }

        .owner-tag { color: var(--bright-red); font-weight: bold; font-size: 15px; display: block; }
        
        /* Gaya Tarikh */
        .date-tag { color: #555; font-size: 11px; margin-bottom: 12px; display: block; font-family: monospace; }

        .story-text { font-family: 'Georgia', serif; line-height: 1.8; color: var(--text-gray); white-space: pre-wrap; margin-top: 10px; }

        .btn-delete {
            position: absolute; top: 15px; right: 15px; background: transparent;
            color: #444; border: 1px solid #333; padding: 4px 10px; font-size: 10px; cursor: pointer;
        }
        .btn-delete:hover { background: #ff0000; color: white; border-color: #ff0000; }

        .empty-msg { text-align: center; color: #333; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

    <div class="input-section">
        <h1>PORTAL MISTIK</h1>
        
        <div class="field">
            <label>Nama Pemilik (Owner)</label>
            <input type="text" id="ownerInput" placeholder="Siapa saksi kejadian?">
        </div>

        <div class="field">
            <label>Kisah Seram</label>
            <textarea id="storyInput" rows="6" placeholder="Ceritakan detik mencemaskan itu..."></textarea>
        </div>

        <button class="btn-save" onclick="simpanKisah()">Simpan ke Arkib</button>
    </div>

    <div class="archive-section">
        <div class="archive-title">
            <span>Senarai Catatan</span>
            <small id="countTag">0 kisah</small>
        </div>
        <div id="storyList"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', muatTurunKisah);

        function simpanKisah() {
            const owner = document.getElementById('ownerInput').value;
            const story = document.getElementById('storyInput').value;

            if (!owner || !story) {
                alert("Jangan biarkan ia kosong...");
                return;
            }

            // Jana Tarikh & Masa
            const sekarang = new Date();
            const tarikhFormat = sekarang.toLocaleString('ms-MY', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', hour12: true 
            });

            const kisahBaru = {
                id: Date.now(),
                nama: owner,
                teks: story,
                tarikh: tarikhFormat
            };

            let senaraiKisah = JSON.parse(localStorage.getItem('arkibSeram')) || [];
            senaraiKisah.unshift(kisahBaru);
            localStorage.setItem('arkibSeram', JSON.stringify(senaraiKisah));

            document.getElementById('ownerInput').value = '';
            document.getElementById('storyInput').value = '';
            muatTurunKisah();
        }

        function muatTurunKisah() {
            const listDiv = document.getElementById('storyList');
            const countTag = document.getElementById('countTag');
            let senaraiKisah = JSON.parse(localStorage.getItem('arkibSeram')) || [];

            listDiv.innerHTML = '';
            countTag.innerText = `${senaraiKisah.length} kisah`;

            if (senaraiKisah.length === 0) {
                listDiv.innerHTML = '<p class="empty-msg">Tiada rekod buat masa ini...</p>';
                return;
            }

            senaraiKisah.forEach(kisah => {
                const card = document.createElement('div');
                card.className = 'story-card';
                card.innerHTML = `
                    <span class="owner-tag">${kisah.nama}</span>
                    <span class="date-tag">Direkodkan pada: ${kisah.tarikh}</span>
                    <div class="story-text">${kisah.teks}</div>
                    <button class="btn-delete" onclick="padamKisah(${kisah.id})">PADAM</button>
                `;
                listDiv.appendChild(card);
            });
        }

        function padamKisah(id) {
            if (confirm("Hapuskan rekod ini dari pangkalan data?")) {
                let senaraiKisah = JSON.parse(localStorage.getItem('arkibSeram')) || [];
                senaraiKisah = senaraiKisah.filter(k => k.id !== id);
                localStorage.setItem('arkibSeram', JSON.stringify(senaraiKisah));
                muatTurunKisah();
            }
        }
    </script>

</body>
</html>
