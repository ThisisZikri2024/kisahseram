<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkib Mistik - Portal Kisah Seram</title>
    <style>
        :root {
            --blood-red: #8b0000;
            --bright-red: #ff0000;
            --dark-bg: #050505;
            --card-bg: #111;
            --text-gray: #bbb;
        }

        body {
            background-color: var(--dark-bg);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .warning-box {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--bright-red);
            color: var(--bright-red);
            padding: 15px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .input-section {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border: 1px solid #300;
            border-top: 4px solid var(--bright-red);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
            margin-bottom: 50px;
            border-radius: 4px;
        }

        h1 {
            text-align: center;
            color: var(--bright-red);
            letter-spacing: 5px;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        label { display: block; font-size: 11px; text-transform: uppercase; color: #777; margin-bottom: 5px; font-weight: bold; }

        input, textarea {
            width: 100%; padding: 12px; background: #080808; border: 1px solid #222;
            color: #fff; box-sizing: border-box; font-size: 14px; transition: 0.3s; margin-bottom: 15px;
        }

        input:focus, textarea:focus { border-color: var(--bright-red); outline: none; }

        .btn-save {
            width: 100%; padding: 15px; background: var(--blood-red); color: white; border: none;
            font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.4s; letter-spacing: 2px;
        }

        .btn-save:hover { background: var(--bright-red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }

        /* MODAL / POPUP STYLE */
        #statusPopup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 20px;
            border: 2px solid var(--bright-red);
            z-index: 1000;
            text-align: center;
            width: 300px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .btn-platform {
            display: block; width: 100%; padding: 10px; margin-top: 10px;
            background: #333; color: white; border: none; cursor: pointer; text-decoration: none; font-size: 12px;
        }

        .btn-platform:hover { background: #555; }

        .archive-section { width: 100%; max-width: 600px; }
        .story-card { background: #121212; padding: 20px; margin-bottom: 15px; border-left: 4px solid #333; position: relative; }
        .story-text { color: #bbb; white-space: pre-wrap; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="warning-box">
        ⚠️ AMARAN: TEKS BERJAYA DIHASILKAN. SILA HANTAR KE PLATFORM RASMI: THISISZIKRI2024
    </div>

    <div class="input-section">
        <h1>PORTAL MISTIK</h1>
        
        <label>Nama Pemilik</label>
        <input type="text" id="ownerInput" placeholder="Nama anda...">

        <label>Negeri</label>
        <input type="text" id="stateInput" placeholder="Contoh: Selangor">

        <label>Kisah Seram</label>
        <textarea id="storyInput" rows="5" placeholder="Ceritakan..."></textarea>

        <button class="btn-save" onclick="simpanDanProses()">Simpan & Hantar</button>
    </div>

    <div id="statusPopup">
        <p style="color: #00ff00; font-weight: bold;">✅ FAIL TELAH DIMUAT TURUN!</p>
        <p style="font-size: 12px;">Sila hantar teks ini kepada <b>thisiszikri2024</b> melalui:</p>
        <a id="tgLink" class="btn-platform" target="_blank">KIRIM KE TELEGRAM</a>
        <a id="waLink" class="btn-platform" target="_blank">KIRIM KE WHATSAPP</a>
        <button class="btn-platform" onclick="tutupPopup()" style="background: var(--blood-red);">TUTUP</button>
    </div>

    <div class="archive-section" id="storyList"></div>

    <script>
        function simpanDanProses() {
            const owner = document.getElementById('ownerInput').value;
            const state = document.getElementById('stateInput').value;
            const story = document.getElementById('storyInput').value;

            if (!owner || !story) {
                alert("Sila isi nama dan kisah.");
                return;
            }

            const data = {
                nama: owner,
                lokasi: state,
                teks: story,
                waktu: new Date().toLocaleString()
            };

            // 1. Muat turun fail secara automatik
            muatTurunTxt(data);

            // 2. Sediakan link ke platform rasmi (thisiszikri2024)
            const mesejRasmi = encodeURIComponent(`SALAM ZIKRI. INI KISAH MISTIK SAYA:\n\nNama: ${data.nama}\nNegeri: ${data.lokasi}\nKisah: ${data.teks}`);
            
            // Telegram (Biasanya handle digunakan terus)
            document.getElementById('tgLink').href = `https://t.me/thisiszikri2024?text=${mesejRasmi}`;
            
            // WhatsApp (Jika anda ada nombor, gantikan 60123456789 di bawah)
            document.getElementById('waLink').href = `https://wa.me/?text=${mesejRasmi}`;

            // 3. Papar Popup
            document.getElementById('statusPopup').style.display = 'block';

            // Reset input
            document.getElementById('ownerInput').value = '';
            document.getElementById('storyInput').value = '';
        }

        function muatTurunTxt(data) {
            const kandungan = `LAPORAN MISTIK\n----------------\nOleh: ${data.nama}\nNegeri: ${data.lokasi}\nTarikh: ${data.waktu}\n\nKISAH:\n${data.teks}`;
            const blob = new Blob([kandungan], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Kisah_${data.nama}.txt`;
            link.click();
        }

        function tutupPopup() {
            document.getElementById('statusPopup').style.display = 'none';
        }
    </script>
</body>
</html>
