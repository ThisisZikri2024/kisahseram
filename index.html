<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkib Kisah Seram Teragung</title>
    <style>
        :root {
            --blood-red: #8b0000;
            --bright-red: #ff0000; /* Warna LED terang */
            --dark-bg: #050505;
            --card-bg: #111;
            --text-gray: #bbb;
        }

        body {
            background-color: var(--dark-bg);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* BAHAGIAN INPUT DENGAN GLOW LED */
        .input-section {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border: 1px solid #300; /* Border gelap sikit */
            border-top: 4px solid var(--bright-red);
            
            /* Kesan Glow LED Merah di sekeliling kotak */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2), 
                        0 0 40px rgba(255, 0, 0, 0.1);
            
            margin-bottom: 50px;
            border-radius: 4px;
        }

        h1 {
            text-align: center;
            color: var(--bright-red);
            letter-spacing: 5px;
            margin-top: 0;
            /* Kesan Neon pada Tulisan */
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7), 
                         0 0 20px rgba(255, 0, 0, 0.3);
        }

        .field { margin-bottom: 15px; }
        
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: #080808;
            border: 1px solid #222;
            color: #fff;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
        }

        /* Glow bila user klik pada input */
        input:focus, textarea:focus {
            border-color: var(--bright-red);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
            outline: none;
        }

        button.btn-save {
            width: 100%;
            padding: 15px;
            background: var(--blood-red);
            color: white;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        button.btn-save:hover { 
            background: var(--bright-red); 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        /* Bahagian Paparan Senarai */
        .archive-section {
            width: 100%;
            max-width: 600px;
        }

        .archive-title {
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .story-card {
            background: #121212;
            padding: 25px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #1a1a1a;
            border-left: 4px solid #333;
            position: relative;
            transition: 0.3s;
        }

        .story-card:hover { 
            border-left-color: var(--bright-red); 
            background: #181818;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.05);
        }

        .owner-tag {
            color: var(--bright-red);
            font-weight: bold;
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 0 5px rgba(255,0,0,0.3);
        }

        .story-text {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            color: var(--text-gray);
            white-space: pre-wrap;
        }

        .btn-delete {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            color: #444;
            border: 1px solid #333;
            padding: 4px 10px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-delete:hover { background: #ff0000; color: white; border-color: #ff0000; }

        .empty-msg { text-align: center; color: #333; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

    <div class="input-section">
        <h1>PORTAL MISTIK</h1>
        
        <div class="field">
            <label>Nama Pemilik (Owner)</label>
            <input type="text" id="ownerInput" placeholder="Saksi kejadian...">
        </div>

        <div class="field">
            <label>Kisah Seram</label>
            <textarea id="storyInput" rows="6" placeholder="Ceritakan detik mencemaskan itu..."></textarea>
        </div>

        <button class="btn-save" onclick="simpanKisah()">Simpan ke Arkib</button>
    </div>

    <div class="archive-section">
        <div class="archive-title">
            <span>Senarai Catatan</span>
            <small id="countTag">0 kisah</small>
        </div>
        <div id="storyList"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', muatTurunKisah);

        function simpanKisah() {
            const owner = document.getElementById('ownerInput').value;
            const story = document.getElementById('storyInput').value;

            if (!owner || !story) {
                alert("Jangan biarkan ruangan kosong.");
                return;
            }

            const kisahBaru = {
                id: Date.now(),
                nama: owner,
                teks: story
            };

            let senaraiKisah = JSON.parse(localStorage.getItem('arkibSeram')) || [];
            senaraiKisah.unshift(kisahBaru);
            localStorage.setItem('arkibSeram', JSON.stringify(senaraiKisah));

            document.getElementById('ownerInput').value = '';
            document.getElementById('storyInput').value = '';
            muatTurunKisah();
        }

        function muatTurunKisah() {
            const listDiv = document.getElementById('storyList');
            const countTag = document.getElementById('countTag');
            let senaraiKisah = JSON.parse(localStorage.getItem('arkibSeram')) || [];

            listDiv.innerHTML = '';
            countTag.innerText = `${senaraiKisah.length} kisah`;

            if (senaraiKisah.length === 0) {
                listDiv.innerHTML = '<p class="empty-msg">Tiada catatan ditemui... buat masa ini.</p>';
                return;
            }

            senaraiKisah.forEach(kisah => {
                const card = document.createElement('div');
                card.className = 'story-card';
                card.innerHTML = `
                    <span class="owner-tag">Oleh: ${kisah.nama}</span>
                    <div class="story-text">${kisah.teks}</div>
                    <button class="btn-delete" onclick="padamKisah(${kisah.id})">PADAM</button>
                `;
                listDiv.appendChild(card);
            });
        }

        function padamKisah(id) {
            if (confirm("Padam kisah ini dari ingatan?")) {
                let senaraiKisah = JSON.parse(localStorage.getItem('arkibSeram')) || [];
                senaraiKisah = senaraiKisah.filter(k => k.id !== id);
                localStorage.setItem('arkibSeram', JSON.stringify(senaraiKisah));
                muatTurunKisah();
            }
        }
    </script>

</body>
</html>
